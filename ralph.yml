# Ralph Orchestrator Configuration
# Generated by: ralph init --backend opencode
# Docs: https://github.com/mikeyobrien/ralph-orchestrator

cli:
  backend: "opencode"

event_loop:
  # prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 100
  # max_runtime_seconds: 14400    # 4 hours max

core:
  guardrails:
    - "You MUST use the available OpenSpec skills to process tasks and manage state."
    - "Do not guess task completion; rely on the OpenSpec skills to verify and mark tasks."
    - Documentation, WXT documentation is available at ./wxt-docs.xml in the project root
    - Documentation, Consult it when working with WXT APIs, configuration, or extension patterns

